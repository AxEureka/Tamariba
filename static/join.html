<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ルーム参加</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  background: #222;
  padding: 30px;
  border-radius: 14px;
  width: 320px;
}
input, button {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
}
button { cursor: pointer; }
</style>
</head>
<body>

<div class="box">
  <h2>ルーム参加</h2>
  <input id="nickname" placeholder="ニックネーム">
  <button onclick="joinRoom()">参加</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const roomId = params.get("room");

async function joinRoom() {
  const name = document.getElementById("nickname").value;
  if (!name) {
    alert("名前を入力してください");
    return;
  }

  // サーバに参加リクエスト
  const res = await fetch(`/room/${roomId}/join`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  const data = await res.json();

  if (!data.ok) {
    alert("入室できませんでした");
    return;
  }

  // id付きでroom.htmlに遷移
  location.href =
    `/static/room.html?room=${roomId}&name=${encodeURIComponent(name)}&id=${data.id}`;
}
</script>

</body>
</html>
