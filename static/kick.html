<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>退出しました</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.box {
  background: #300;
  padding: 40px;
  border-radius: 14px;
  text-align: center;
}
button {
  margin-top: 15px;
  padding: 8px 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="box">
  <h2>⚠ ルームから退出しました</h2>
  <p>画面を閉じてください。</p>
  <button onclick="closeWindow()">閉じる</button>
</div>

<script>
function closeWindow() {
  // 可能な場合はウィンドウを閉じる
  if (window.close) window.close();
  else alert("この画面を閉じてください。");
}

// ページが読み込まれた時も注意喚起
window.onload = () => {
  console.log("kickページ表示中: 画面を閉じてください");
};
</script>

</body>
</html>
