<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ルーム</title>
<link rel="stylesheet" href="/static/css/quiz-ui.css">
<link rel="stylesheet" href="/static/css/nasa-ui.css">

<style>
html, body{
  margin:0;
  height:100%;
  font-family:sans-serif;
  color:white;
}

body{
  background-size:cover;
  background-position:center;
}

/* 退出ボタン */
.exit{
  position:fixed;
  top:20px;
  right:20px;
  padding:8px 14px;
  cursor:pointer;
}

/* ルームUI */
.room-ui{
  background:rgba(0,0,0,0.75);
  padding:28px;
  margin:40px;
  border-radius:16px;
  max-width:720px;
}

/* ボタン共通 */
button{
  cursor:pointer;
  padding:6px 12px;
  margin-left:6px;
}

/* セクション */
.section{
  margin-top:24px;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,0.3);
}

#qrModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#qrBox{
  background:#111;
  padding:24px;
  border-radius:16px;
  text-align:center;
}

/* メンバー */
#members{
  margin-top:10px;
}

/* ポップアップ */
#popup{
  position:fixed;
  top:20px;
  right:20px;
  background:rgba(0,0,0,0.9);
  padding:12px 18px;
  border-radius:10px;
  display:none;
}

/* ゲーム選択メニュー */
#gameDropdown{
  display:none;
  position:absolute;
  top:45px;
  left:0;
  background:rgba(0,0,0,0.95);
  padding:10px 14px;
  border-radius:12px;
  min-width:160px;
  z-index:1000;
}
.gameItem{
  padding:6px 0;
  cursor:pointer;
}
.gameDisabled{
  padding:6px 0;
  opacity:0.4;
  pointer-events:none;
}

/* =========================
   ゲーム表示レイヤー（全ゲーム共通）
========================= */
#game-container{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:10;
}
#game-container.active{
  z-index:500;
}

/* ゲームUI共通クリック許可 */
.quiz-ui, .nasa-ui{
  pointer-events:auto;
}
</style>
</head>

<body>

<button class="exit" onclick="exitRoom()">退出</button>

<!-- タイトルとゲーム選択ボタン -->
<div style="position:relative; display:flex; align-items:center; gap:12px;">
  <h1 id="room-title" style="margin:0;">読み込み中...</h1>

  <div style="display:flex; gap:6px;">
    <button id="gameSelectBtn" style="display:none;">🎮 遊びを選ぶ</button>
    <button id="msgAllBtn" style="display:none;">📩 全体メッセージ</button>
  </div>

  <div id="gameDropdown">
    <div id="quizBtn" class="gameItem">クイズ</div>
    <div id="nasaBtn" class="gameItem">NASAゲーム</div>
    <div class="gameDisabled">大喜利（準備中）</div>
    <div class="gameDisabled">トーク（準備中）</div>
  </div>
</div>

<!-- ルームIDと人数、メンバーボタン -->
<p style="display:flex; align-items:center; justify-content:space-between;">
  <span>
    ルームID：<strong id="room-id"></strong> /
    参加人数：<strong id="count">0</strong>人
  </span>
  <!-- メンバー横のボタン -->
  <div style="display:flex; gap:6px;">
    <button onclick="toggleMembers()">メンバーを見る</button>
    <button id="copyJoinBtn" onclick="copyURL()" style="display:none;">コピーで参加</button>
    <button id="showQRBtn" onclick="openQR()" style="display:none;">QR表示</button>
  </div>
</p>

<div id="members" style="display:none;"></div>

<!-- ホスト用 -->
<div id="host-area" class="section" style="display:none;">
  <input id="join-url" type="hidden" value="">
  <div id="qrcode" style="margin-top:15px;"></div>
  <button id="exitQuizBtn" style="display:none;">遊びを終わる</button>
</div>

<div id="popup"></div>

<!-- ゲーム表示コンテナ（共通） -->
<div id="game-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module" src="/static/js/core/room.js"></script>

<!-- QRモーダル -->
<div id="qrModal" style="display:none;">
  <div id="qrBox">
    <h3>参加用QRコード</h3>
    <div id="qrModalCode"></div>
    <button onclick="closeQR()">閉じる</button>
  </div>
  
</div>
</body>
</html>
