<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ルーム</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: sans-serif;
  color: white;
}

body {
  background-size: cover;
  background-position: center;
}

.exit {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 8px 14px;
  cursor: pointer;
}

.room-ui {
  background: rgba(0,0,0,0.75);
  padding: 28px;
  margin: 40px;
  border-radius: 16px;
  max-width: 720px;
}

button {
  cursor: pointer;
  padding: 6px 12px;
  margin-left: 6px;
}

.section {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.3);
}

#members {
  margin-top: 10px;
}

#popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.9);
  padding: 12px 18px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<button class="exit" onclick="exitRoom()">退出</button>

<div class="room-ui">

  <h1 id="room-title">読み込み中...</h1>

  <p>
    ルームID：<strong id="room-id"></strong>
    / 参加人数：<strong id="count">0</strong>人
    <button onclick="toggleMembers()">メンバーを見る</button>
  </p>

  <div id="members" style="display:none;"></div>

  <!-- 親専用エリア -->
  <div id="host-area" class="section" style="display:none;">

    <h3>🔗 招待</h3>

    <input id="join-url" readonly style="width:75%;">
    <button onclick="copyURL()">コピー</button>

    <div id="qrcode" style="margin-top:15px;"></div>

    <div class="section">
      <h3>🎮 クイズ設定</h3>

      問題モード：
      <select id="question-mode">
        <option value="manual">その場入力</option>
        <option value="list">事前登録リスト</option>
      </select>

      出題形式：
      <select id="answer-style">
        <option value="normal">通常（全員回答）</option>
        <option value="fast">早押し（将来用）</option>
      </select>

      <br><br>

      <button onclick="goQuestionEditor()">📝 問題リストを管理</button>
      <button onclick="startQuiz()">🚀 クイズ開始</button>
    </div>

  </div>

</div>

<div id="popup"></div>

<script>
const params = new URLSearchParams(location.search);
const roomId = params.get("room");
let myName = params.get("name") || "";
let hostName = "";
let lastMembers = [];

// ===== 初期読み込み =====
async function loadRoom() {
  const res = await fetch(`/room/${roomId}`);
  if (!res.ok) {
    alert("ルームが存在しません");
    location.href = "/static/index.html";
    return;
  }

  const data = await res.json();
  hostName = data.host;

  if (!myName) myName = hostName;

  if (myName !== hostName) {
    await fetch(`/room/${roomId}/join`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name: myName })
    });
  }

  document.body.style.backgroundImage =
    `url('/static/themes/${data.theme}.jpg')`;

  document.getElementById("room-title").textContent =
    `${data.room}（親：${data.host}さん）`;

  document.getElementById("room-id").textContent = roomId;

  // ===== 親のみ招待機能表示 =====
  if (myName === hostName) {
    document.getElementById("host-area").style.display = "block";

    const joinURL =
      window.location.origin +
      "/static/join.html?room=" + roomId;

    document.getElementById("join-url").value = joinURL;

    new QRCode(
      document.getElementById("qrcode"),
      joinURL
    );
  }
}

// ===== メンバー更新 =====
async function updateMembers() {
  const res = await fetch(`/room/${roomId}/members`);
  if (!res.ok) return;

  const data = await res.json();
  document.getElementById("count").textContent = data.count;

  if (lastMembers.length > 0) {
    const joined = data.members.filter(m => !lastMembers.includes(m));
    const left = lastMembers.filter(m => !data.members.includes(m));

    joined.forEach(m => {
      if (m !== myName) showPopup(`${m}さんが入室しました`);
    });

    left.forEach(m => {
      showPopup(`${m}さんが退出しました`);
    });
  }

  lastMembers = [...data.members];

  const list = [];
  list.push(`<strong>${hostName} (親)</strong>`);

  data.members.forEach(m => {
    if (m === hostName) return;

    if (myName === hostName) {
      list.push(`・${m} <button onclick="kick('${m}')">退出</button>`);
    } else if (m === myName) {
      list.push(`・${m} (自分)`);
    } else {
      list.push(`・${m}`);
    }
  });

  document.getElementById("members").innerHTML = list.join("<br>");
}

setInterval(updateMembers, 3000);

// ===== クイズ開始 =====
async function startQuiz() {
  const mode = document.getElementById("question-mode").value;
  const style = document.getElementById("answer-style").value;

  await fetch(`/room/${roomId}/start_quiz`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ mode, style })
  });

  location.href =
    `/static/quiz.html?room=${roomId}&name=${encodeURIComponent(myName)}`;
}

// ===== 問題管理画面 =====
function goQuestionEditor() {
  location.href =
    `/static/question_editor.html?room=${roomId}&name=${encodeURIComponent(myName)}`;
}

// ===== UI =====
function toggleMembers() {
  const box = document.getElementById("members");
  box.style.display =
    box.style.display === "none" ? "block" : "none";
}

function showPopup(text) {
  const popup = document.getElementById("popup");
  popup.textContent = text;
  popup.style.display = "block";
  setTimeout(() => popup.style.display = "none", 3000);
}

function copyURL() {
  const input = document.getElementById("join-url");
  input.select();
  navigator.clipboard.writeText(input.value);
  showPopup("参加URLをコピーしました");
}

async function kick(name) {
  await fetch(`/room/${roomId}/kick`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });
}

function exitRoom() {
  location.href = "/static/index.html";
}

loadRoom();
updateMembers();
</script>

</body>
</html>
