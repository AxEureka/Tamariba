<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ルーム</title>
    <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      color: white;
    }
    body {
      background-size: cover;
      background-position: center;
    }
    .exit {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 14px;
      cursor: pointer;
    }
    .room-ui {
      background: rgba(0,0,0,0.75);
      padding: 28px;
      margin: 40px;
      border-radius: 16px;
      max-width: 720px;
    }
    button {
      cursor: pointer;
      padding: 6px 12px;
      margin-left: 6px;
    }
    .section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.3);
    }
    #members {
      margin-top: 10px;
    }
    #popup {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.9);
      padding: 12px 18px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

<button class="exit" onclick="exitRoom()">退出</button>

<div style="position:relative; display:flex; align-items:center; gap:12px;">
  <h1 id="room-title" style="margin:0;">読み込み中...</h1>

  <button id="gameSelectBtn" style="display:none;">🎮 遊びを選ぶ</button>

  <div id="gameDropdown" style="
    display:none;
    position:absolute;
    top:45px;
    left:0;
    background:rgba(0,0,0,0.95);
    padding:10px 14px;
    border-radius:12px;
    min-width:160px;
  ">
    <div onclick="selectGame('quiz')" style="padding:6px 0; cursor:pointer;">
      クイズ
    </div>
    <div style="padding:6px 0; opacity:0.4;">
      大喜利（準備中）
    </div>
    <div style="padding:6px 0; opacity:0.4;">
      トーク（準備中）
    </div>
  </div>
</div>

<p>
  ルームID：<strong id="room-id"></strong> /
  参加人数：<strong id="count">0</strong>人
  <button onclick="toggleMembers()">メンバーを見る</button>
</p>

<div id="members" style="display:none;"></div>

<div id="host-area" class="section" style="display:none;">
  <h3>🔗 招待</h3>
  <input id="join-url" readonly style="width:75%;">
  <button onclick="copyURL()">コピー</button>
  <div id="qrcode" style="margin-top:15px;"></div>
</div>

<div id="popup"></div>

<script src="/static/js/core/room.js"></script>
<script src="/static/js/quiz/quiz-ui.js"></script>

</body>
</html>
